<!DOCTYPE html>
<html>
<head>
  <title>Data Entry Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
    .container { background: white; padding: 30px; border-radius: 8px; max-width: 500px; margin: auto; }
    h1 { color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    button:hover { background: #45a049; }
    .nav { margin-top: 20px; text-align: center; }
    .nav a { margin: 0 10px; color: #2196F3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>User Information Form</h1>
    <form action="/submit" method="POST">
      <div class="form-group">
        <label for="name">NAME:</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="reg">REG:</label>
        <input type="text" id="reg" name="reg" required>
      </div>
      <div class="form-group">
        <label for="dob">DOB:</label>
        <input type="date" id="dob" name="dob" required>
      </div>
      <div class="form-group">
        <label for="email">EMAIL:</label>
        <input type="email" id="email" name="email" required>
      </div>
      <button type="submit">Submit</button>
    </form>
    <div class="nav">
      <a href="/">Home</a> | <a href="/users">View Database</a>
    </div>
  </div>
</body>
</html>
